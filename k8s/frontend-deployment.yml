apiVersion: apps/v1
kind: Deployment
metadata:
  name: devnotes-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devnotes-frontend
  template:
    metadata:
      labels:
        app: devnotes-frontend
    spec:
      containers:
        - name: devnotes-frontend
          image: vineethgongati/devnotes-frontend:v5
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: devnotes-frontend
spec:
  type: NodePort
  selector:
    app: devnotes-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
