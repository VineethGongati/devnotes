apiVersion: apps/v1
kind: Deployment
metadata:
  name: devnotes-postgres
  namespace: devnotes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devnotes-postgres
  template:
    metadata:
      labels:
        app: devnotes-postgres
    spec:
      containers:
      - name: devnotes-postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: devnotes
        - name: POSTGRES_USER
          value: devnotes
        - name: POSTGRES_PASSWORD
          value: devnotes123
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc