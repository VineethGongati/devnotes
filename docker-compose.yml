# docker-compose.yml

services:
  postgres:
    image: postgres:16-alpine
    container_name: devnotes-db
    environment:
      POSTGRES_DB: devnotes
      POSTGRES_USER: devnotes
      POSTGRES_PASSWORD: devnotes123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devnotes"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devnotes-net

  redis:
    image: redis:7-alpine
    container_name: devnotes-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devnotes-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: devnotes-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://devnotes:devnotes123@postgres:5432/devnotes
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    networks:
      - devnotes-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev                              # targets the dev stage
      args:
        - VITE_API_URL=http://localhost:3000   # baked at build time
    container_name: devnotes-web
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started
    command: npm run dev -- --host 0.0.0.0
    networks:
      - devnotes-net

volumes:
  postgres_data:
  redis_data:

networks:
  devnotes-net:
    driver: bridge
