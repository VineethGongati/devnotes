name: CI/CD - Build, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: vineethgongati/devnotes-backend
  FRONTEND_IMAGE: vineethgongati/devnotes-frontend

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:v${{ github.run_number }}
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:v${{ github.run_number }}
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update image tags in manifests
        run: |
          sed -i "s|image:.*devnotes-backend:.*|image: ${{ env.BACKEND_IMAGE }}:v${{ github.run_number }}|g" k8s/backend-deployment.yml
          sed -i "s|image:.*devnotes-frontend:.*|image: ${{ env.FRONTEND_IMAGE }}:v${{ github.run_number }}|g" k8s/frontend-deployment.yml

      - name: Commit updated manifests
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add k8s/
          git diff --cached --quiet || git commit -m "Update image tags to v${{ github.run_number }}"
          git push