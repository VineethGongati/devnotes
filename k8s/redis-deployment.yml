apiVersion: apps/v1
kind: Deployment
metadata:
  name: devnotes-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devnotes-redis
  template:
    metadata:
      labels:
        app: devnotes-redis
    spec:
      containers:
        - name: devnotes-redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: devnotes-redis
spec:
  selector:
    app: devnotes-redis
  ports:
    - port: 6379
      targetPort: 6379
